# docker-compose.yml
# No 'version:' field — Docker Compose v2

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     secos_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ai_secos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Use pg_isready with explicit credentials — avoids false unhealthy
      test: ["CMD-SHELL", "pg_isready -U secos_user -d ai_secos_db -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      # HTTP check against the status endpoint — no password required
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_HOST:        postgres
      POSTGRES_PORT:        5432
      POSTGRES_USER:        secos_user
      POSTGRES_PASSWORD:    ${DB_PASSWORD}
      POSTGRES_DB:          ai_secos_db
      NEO4J_HOST:           neo4j
      NEO4J_PORT:           7687
      NEO4J_AUTH:           neo4j/${NEO4J_PASSWORD}
      SECRET_KEY:           ${SECRET_KEY}
      JWT_ALGORITHM:        HS256
      JWT_EXPIRATION_HOURS: 24
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started   # healthy takes too long; app retries anyway
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  neo4j_data:
